name: Lint Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Make lint script executable
        run: chmod +x scripts/lint-skills.sh

      - name: Lint skills
        run: |
          SKILL_COUNT=$(find skills -name "SKILL.md" -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$SKILL_COUNT" -eq 0 ]; then
            echo "No SKILL.md files found — nothing to lint"
            exit 0
          fi
          ./scripts/lint-skills.sh skills
